<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Disqus PHP API 示例</title>
    <link rel="stylesheet" href="./src/iDisqus.css">
    <link rel="stylesheet" href="./src/iDisqus.min.css">
</head>
<body>
    <p>本页共有 <span data-disqus-url="/disqus-php-api.html"></span> 条评论，
    项目地址：<a href="https://github.com/achuanya/disqus-php-api" target="_blank">https://github.com/fooleap/disqus-php-api</a></p>
    <div id="comment"></div>
</body>
</html>
<script src="https://cdn.staticfile.org/jquery/2.1.3/jquery.min.js"></script>
<script src="./src/iDisqus.min.js"></script>
<script>
  $(document).ready(function(){
      var disq = new iDisqus('comment', {
        forum: 'https-achuan-io',
        api: 'https://api.achuan.io/api/',
        site: 'https://achuan.io',
        mode: 2,
        timeout: 3000,
        init: true,
      });
  });
</script>
